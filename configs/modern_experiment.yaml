# Modern Architecture Experiment Config
# VGG-Spiking and Spiking Attention

defaults:
  - _self_

# Architecture selection
arch_type: "vgg"  # "vgg" or "attention"
depth: 11         # VGG: 11, 13, 16, 19; Attention: num_blocks

# Spiking Attention specific
embed_dim: 64
num_heads: 4

# Plasticity toggle
use_plasticity: true

# Neuron params
beta: 0.9
threshold: 1.0
slope: 25.0
num_steps: 25

# Initialization
init_method: "sabotage"
init_std: 0.01

# Plasticity params
eta_stdp: 0.005
target_rate: 0.1

# Training
epochs: 10
learning_rate: 0.001
weight_decay: 0.0001
gradient_clip: 1.0
fast_dev_run: false

# Data
data:
  root: "./data"
  batch_size: 64
  num_workers: 0
  pin_memory: true

# Hydra
hydra:
  run:
    dir: outputs/modern/${now:%Y-%m-%d}/${now:%H-%M-%S}
